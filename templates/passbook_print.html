<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
@media print {
  @page {
      size: 210mm 80mm;
      margin: 0;
  }

  html, body {
      width: 210mm;
      height: 80mm;
      margin: 0;
      padding: 0;
  }
}

body {
  font-family: "Courier New", monospace;
  font-size: 10px;
}

/* ?? PRINT AREA POSITION (Adjust if needed) */
.container {
  position: absolute;
  top: 15mm;     /* ?? upar niche adjust */
  left: 6mm;     /* ?? left right adjust */
  width: 195mm;
}

/* ?? TABLE STYLE */
table {
  width: 100%;
  border-collapse: collapse;
}

/* ?? FIXED LINE HEIGHT FOR DOT MATRIX */
tr {
  height: 5mm;   /* ?? line spacing control */
}

td {
  padding: 0 4px;
  vertical-align: middle;
}

/* ?? COLUMN WIDTH FIX */
.date { width: 20%; }
.type { width: 15%; }
.amount { width: 20%; text-align: right; }
.remark { width: 45%; }

</style>
</head>

<body onload="window.print()">

<div class="container">

<table>

{% for r in rows %}
<tr>
    <td class="date">{{ r[0] }}</td>
    <td class="type">{{ r[1] }}</td>
    <td class="amount">{{ "%.2f"|format(r[2]) }}</td>
    <td class="remark">{{ r[3] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
