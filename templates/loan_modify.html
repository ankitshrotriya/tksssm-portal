{% extends "base.html" %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>


<div class="container my-4">
  <div class="card mx-auto" style="max-width:900px;">
    <div class="card-body">
      <h4 class="card-title">Modify Loan EMI / Tenure</h4>

      <form id="modifyForm" method="POST" action="{{ url_for('loan_modify_apply') }}">
        <div class="row g-3">
          <div class="col-md-6">
  <label>Member</label>
  <input type="text" id="member_search" class="form-control" placeholder="Type to search member..." autocomplete="off">
  <div id="search_results" class="list-group mt-1" style="position:absolute; z-index:1000;"></div>
  <input type="hidden" id="member_select" name="member_no">
</div>


          <div class="col-md-6">
            <label>Active Loan</label>
            <select id="loan_select" name="loan_no" class="form-select" required>
              <option value="">-- select loan --</option>
            </select>
          </div>

          <div class="col-md-4">
            <label>Outstanding (old)</label>
            <input type="text" id="outstanding_old" class="form-control" readonly>
          </div>
          <div class="col-md-4">
            <label>EMI (old)</label>
            <input type="text" id="emi_old" class="form-control" readonly>
          </div>
          <div class="col-md-4">
            <label>Tenure (old months)</label>
            <input type="text" id="tenure_old" class="form-control" readonly>
          </div>

          <hr class="mt-3 mb-1"/>

          <div class="col-md-4">
            <label>New EMI (₹)</label>
            <input type="text" id="new_emi" name="new_emi" class="form-control" placeholder="Enter new EMI">
          </div>

          <div class="col-md-4">
            <label>New Outstanding (₹)</label>
            <input type="text" id="new_outstanding" name="new_outstanding" class="form-control" placeholder="Optional" readonly>
          </div>

          <div class="col-md-4">
            <label>New Tenure (months)</label>
            <input type="number" id="new_tenure" name="new_tenure" class="form-control" placeholder="Optional" readonly>
          </div>

          <div class="col-12">
            <small class="text-muted">Tip: Enter either New EMI or New Tenure (or both). If New Outstanding provided, it will be used.</small>
          </div>

          <div class="col-12 text-end mt-3">
            <button type="button" id="previewBtn" class="btn btn-secondary">Preview</button>
            <button type="submit" class="btn btn-primary">Submit Modify</button>
          </div>

        </div>
      </form>

      <hr>
      <div id="previewBox" style="display:none;">
        <h5>Preview</h5>
        <p id="previewText"></p>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(function(){
  // load members
  $.getJSON("/api/members").done(function(data){
    data.forEach(function(m){
      $("#member_select").append($("<option>").val(m.member_no).text(m.member_name + " — " + m.member_no));
    });
  });

  $("#member_select").change(function(){
    const member_no = $(this).val();
    $("#loan_select").empty().append($("<option>").text("-- select loan --").val(""));
    if(!member_no) return;
    $.getJSON("/api/member_loans", {member_no: member_no}).done(function(loans){
      loans.forEach(function(l){
        const txt = l.loan_no + " — Outstanding: ₹" + l.outstanding.toFixed(2) + " — EMI: ₹" + l.emi.toFixed(2);
        $("#loan_select").append($("<option>").val(l.loan_no).data("loan", JSON.stringify(l)).text(txt));
      });
    });
  });

  $("#loan_select").change(function(){
    const loan_no = $(this).val();
    if(!loan_no) {
      $("#outstanding_old,#emi_old,#tenure_old,#new_emi,#new_outstanding,#new_tenure").val("");
      return;
    }
    $.getJSON("/api/loan_details", {loan_no: loan_no}).done(function(d){
      $("#outstanding_old").val(d.outstanding.toFixed(2));
      $("#emi_old").val(d.emi.toFixed(2));
      $("#tenure_old").val(d.tenure_months);
      $("#new_emi,#new_outstanding,#new_tenure").val("");
      $("#previewBox").hide();
    });
  });

  function safeFloat(v){ v = (v||"").toString().replace(/,/g,'').trim(); return v === "" ? null : parseFloat(v); }

  // Auto-calculate new Outstanding & Tenure when New EMI is entered
  function recalcFromEMI() {
    const out_old = safeFloat($("#outstanding_old").val());
    const emi_new = safeFloat($("#new_emi").val());

    if(out_old && emi_new>0){
        const tenure_new = Math.ceil(out_old / emi_new);
        $("#new_tenure").val(tenure_new);
        $("#new_outstanding").val(out_old.toFixed(2));
    } else {
        $("#new_tenure").val("");
        $("#new_outstanding").val("");
    }
  }

  $("#new_emi").on("keyup change", recalcFromEMI);

  // Preview button
  $("#previewBtn").click(function(){
    const out_old = safeFloat($("#outstanding_old").val());
    const emi_old = safeFloat($("#emi_old").val());
    const tenure_old = parseInt($("#tenure_old").val()||0);

    if(!out_old){
      alert("Select a loan first"); return;
    }

    const new_emi = safeFloat($("#new_emi").val());
    const new_outstanding = safeFloat($("#new_outstanding").val());
    const new_tenure = parseInt($("#new_tenure").val()||0);

    let final_out = out_old, final_emi = emi_old, final_ten = tenure_old;

    if(new_outstanding!=null){
      final_out = new_outstanding;
      if(new_tenure>0){
        final_ten = new_tenure;
        if(new_emi != null) {
			final_emi = new_emi;  // User input EMI priority
		} else {
			final_emi = +(final_out / final_ten).toFixed(2); // Auto calculate sirf EMI missing ho to
		}

      } else if(new_emi!=null){
        final_emi = new_emi;
        final_ten = Math.ceil(final_out / final_emi);
      }
    } else {
      if(new_emi!=null && new_tenure>0){
        final_emi = new_emi; final_ten = new_tenure;
      } else if(new_emi!=null){
        final_emi = new_emi;
        final_ten = Math.ceil(final_out / final_emi);
      } else if(new_tenure>0){
        final_ten = new_tenure;
        if(new_emi != null) {
			final_emi = new_emi;  // User input EMI priority
		} else {
			final_emi = +(final_out / final_ten).toFixed(2); // Auto calculate sirf EMI missing ho to
		}

      } else {
        alert("Provide New EMI or New Tenure (or New Outstanding)."); return;
      }
    }

    $("#previewText").html(
      `<b>Old:</b> Outstanding ₹${out_old.toFixed(2)}, EMI ₹${emi_old.toFixed(2)}, Tenure ${tenure_old} months<br>` +
      `<b>New:</b> Outstanding ₹${final_out.toFixed(2)}, EMI ₹${final_emi.toFixed(2)}, Tenure ${final_ten} months`
    );
    $("#previewBox").show();
  });

});
</script>
<script>
$(document).ready(function() {
    let timer;
    $('#member_search').on('keyup', function() {
        clearTimeout(timer);
        let query = $(this).val().trim();
        $('#search_results').empty();

        if(query.length < 2) return; // minimum 2 chars

        timer = setTimeout(function() {
            $.getJSON('/api/search_members', {q: query}, function(data) {
                if(data.length === 0) {
                    $('#search_results').hide();
                    return;
                }

                data.forEach(function(m) {
                    $('#search_results').append(
                        `<a href="#" class="list-group-item list-group-item-action" data-id="${m.member_no}">${m.name} — ${m.member_no}</a>`
                    );
                });
                $('#search_results').show();
            });
        }, 300); // 300ms delay
    });

    // Click on result
    $('#search_results').on('click', 'a', function(e) {
        e.preventDefault();
        let name = $(this).text();
        let member_no = $(this).data('id');
        $('#member_search').val(name);
        $('#member_select').val(member_no);
        $('#search_results').empty().hide();

        // Load loans for selected member
        $("#loan_select").empty().append($("<option>").text("-- select loan --").val(""));
        $.getJSON("/api/member_loans", { member_no: member_no }).done(function(loans){
            loans.forEach(function(l){
                const txt = l.loan_no + " — Outstanding: ₹" + l.outstanding.toFixed(2) + " — EMI: ₹" + l.emi.toFixed(2);
                $("#loan_select").append($("<option>").val(l.loan_no).data("loan", JSON.stringify(l)).text(txt));
            });
        });
    });

    // Click outside → hide results
    $(document).click(function(e) {
        if(!$(e.target).closest('#member_search, #search_results').length) {
            $('#search_results').empty().hide();
        }
    });
});

</script>


{% endblock %}
