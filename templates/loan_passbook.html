{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center; margin-bottom:25px;">📘 Loan Passbook Report</h2>

<div class="card shadow-lg" style="max-width:750px; margin:auto; padding:25px; border-radius:15px; background:#fdfdfd;">

    <!-- FILTER ROW -->
    <div style="display:flex; gap:20px; align-items:flex-end; flex-wrap:wrap;">

        <!-- Member -->
        <div style="flex:1; min-width:180px;">
            <label style="font-weight:600; font-size:15px;">👤 Member No.</label>
            <input list="memberList" id="memberSelect" class="form-control"
                placeholder="Search Member No or Name..."
                style="border-radius:8px; padding:10px;">
            <datalist id="memberList"></datalist>
        </div>

        <!-- Loan -->
        <div style="flex:1; min-width:180px;">
            <label style="font-weight:600; font-size:15px;">💳 Select Loan No.</label>
            <select id="loanSelect" class="form-control" style="border-radius:8px; padding:10px;">
                <option value="">-- Select Loan --</option>
            </select>
        </div>

        <!-- Start Date -->
        <div style="flex:1; min-width:150px;">
            <label style="font-weight:600; font-size:15px;">📅 Start Date</label>
            <input type="date" id="startDate" class="form-control" style="border-radius:8px; padding:10px;">
        </div>

        <!-- End Date -->
        <div style="flex:1; min-width:150px;">
            <label style="font-weight:600; font-size:15px;">📅 End Date</label>
            <input type="date" id="endDate" class="form-control" style="border-radius:8px; padding:10px;">
        </div>

    </div>

    <!-- BUTTONS -->
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn btn-primary w-100" style="border-radius:8px; font-size:16px; background:#0d6efd; color:white;" onclick="loadLoanPassbook()">🔍 View Passbook</button>
        <button class="btn btn-secondary w-50" style="border-radius:8px; font-size:16px; background:#0d6efd; color:white;" onclick="resetFilters()">🔄 Reset</button>
    </div>

    <hr>

    <div id="resultArea" style="margin-top:15px;"></div>
</div>


<!-- TABLE DESIGN -->
<style>
.styled-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 10px;
  font-size: 15px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
}

.styled-table thead tr {
  background: linear-gradient(90deg, #0d6efd, #4dabff);
  color: white;
  text-transform: uppercase;
  font-weight: bold;
}

.styled-table th, .styled-table td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}

.styled-table tbody tr:nth-child(even) {
  background-color: #f2f7ff;
}

.styled-table tbody tr:nth-child(odd) {
  background-color: #ffffff;
}

.styled-table tbody tr:hover {
  background: #dceeff;
  cursor: pointer;
  transition: 0.2s;
}

.credit {
  color: green;
  font-weight: bold;
}

.debit {
  color: red;
  font-weight: bold;
}
</style>


<script>
// ---- Load Members ----
document.addEventListener("DOMContentLoaded", () => {
    fetch("/get_active_members")
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("memberList");
            data.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m.member_no;
                opt.text = `${m.member_no} - ${m.member_name_eng}`;
                list.appendChild(opt);
            });
        });
});

// ---- Load Loans After Member Selected ----
document.getElementById("memberSelect").addEventListener("change", () => {
    let memberNo = document.getElementById("memberSelect").value;
    let loanSelect = document.getElementById("loanSelect");
    loanSelect.innerHTML = `<option value="">Loading...</option>`;
    document.getElementById("resultArea").innerHTML = "";

    fetch(`/get_loans_by_member/${memberNo}`)
        .then(res => res.json())
        .then(data => {
            loanSelect.innerHTML = `<option value="">-- Select Loan --</option>`;
            data.forEach(loan => {
                let opt = document.createElement("option");
                opt.value = loan.loan_no;
                opt.text = `${loan.loan_no} (${loan.loan_head})`;
                loanSelect.add(opt);
            });
        });
});

// ---- Load Passbook ----
function loadLoanPassbook(){
    let member = document.getElementById("memberSelect").value;
    let loan_no = document.getElementById("loanSelect").value;
    let start = document.getElementById("startDate").value;
    let end = document.getElementById("endDate").value;
    let result = document.getElementById("resultArea");

    if (!member || !loan_no){
        result.innerHTML = `<p style='color:red; font-weight:bold;'>⚠ कृपया Member और Loan Select करें।</p>`;
        return;
    }

    result.innerHTML = "<p>⏳ Loading transactions...</p>";

    fetch(`/get_loan_passbook/${loan_no}`)
        .then(res => res.json())
        .then(data => {
            // FRONTEND DATE FILTER
            let transactions = data.transactions;
            if(start) transactions = transactions.filter(t => t.trans_date >= start);
            if(end) transactions = transactions.filter(t => t.trans_date <= end);

            if (transactions.length === 0){
                result.innerHTML = "<p style='color:red;'>⚠ कोई लेनदेन नहीं मिला।</p>";
                return;
            }

            let html = `
            <div style="overflow-x:auto; margin-top:20px;">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Date</th>
						<th>Remark</th>
						<th>Transaction ID</th>
						<th>Credit</th>
						<th>Debit</th>
						<th>Balance</th>
                    </tr>
                </thead>
                <tbody>
            `;

            transactions.forEach(t => {

				html += `
				<tr>
				<td>${t.date}</td>
				<td>${t.narration || "-"}</td>
				<td>${t.trans_no}</td>
				<td class="credit">${t.credit ? "₹"+t.credit.toFixed(2) : ""}</td>
				<td class="debit">${t.debit ? "₹"+t.debit.toFixed(2) : ""}</td>
				<td style="font-weight:bold; color:${t.balance >= 0 ? 'green' : 'red'}">
				₹${Math.abs(t.balance).toFixed(2)} ${t.balance >= 0 ? 'Cr' : 'Dr'}
				</td>
				</tr>`;
				});
            html += "</tbody></table></div>";
            result.innerHTML = html;
        });
}

// ---- Reset ----
function resetFilters(){
    document.getElementById("memberSelect").value = "";
    document.getElementById("loanSelect").innerHTML = `<option value="">-- Select Loan --</option>`;
    document.getElementById("startDate").value = "";
    document.getElementById("endDate").value = "";
    document.getElementById("resultArea").innerHTML = "";
}
</script>

{% endblock %}
