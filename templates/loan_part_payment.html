{% extends "base.html" %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: #f0f4f8;
        font-family: 'Poppins', sans-serif;
    }
    .form-card {
        background: #fff;
        padding: 25px 30px;
        border-radius: 12px;
        margin-top: 30px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        max-width: 850px;
        margin-left: auto;
        margin-right: auto;
    }
    .form-title {
        text-align: center;
        font-weight: 600;
        font-size: 1.6rem;
        margin-bottom: 25px;
        color: #00368e;
    }
    label {
        font-weight: 600;
    }
    .form-control, .form-select {
        height: 45px;
        border-radius: 8px;
    }
</style>

<div class="container">
    <div class="form-card">

        <h3 class="form-title">💳 Loan Part Payment</h3>

        <div class="row g-3">

            <!-- MEMBER -->
            <div class="col-md-6 position-relative">
                <label>Member No *</label>
                <input type="text" id="member_no" class="form-control" placeholder="Enter or select" autocomplete="off">
                <div id="memberList" class="list-group position-absolute w-100" 
                     style="z-index:999; max-height:200px; overflow-y:auto;"></div>
            </div>

            <!-- LOAN -->
            <div class="col-md-6">
                <label>Loan Number *</label>
                <select id="loan_no" class="form-select" disabled>
                    <option value="">Select member first</option>
                </select>
            </div>

            <!-- TOTAL PAYABLE -->
            <div class="col-md-6">
                <label>Total Payable</label>
                <input type="text" id="total_payable" class="form-control bg-light" readonly>
            </div>

            <!-- PRINCIPAL -->
            <div class="col-md-6">
                <label>Principal Outstanding</label>
                <input type="text" id="principal_outstanding" class="form-control bg-light" readonly>
            </div>

            <!-- PART AMOUNT -->
            <div class="col-md-6">
                <label>Part Payment Amount *</label>
                <input type="number" id="part_amount" step="0.01" class="form-control" placeholder="Enter amount">
            </div>

        </div>

        <div class="text-center mt-4">
            <button id="submitBtn" class="btn btn-primary px-4 py-2">💾 Submit Payment</button>
        </div>

    </div>
</div>


<!-- JS LOGIC -->
<script>

    // MEMBER LIVE SEARCH
    document.getElementById("member_no").addEventListener("keyup", function () {
        let query = this.value.trim();
        if (query.length < 1) {
            document.getElementById("memberList").innerHTML = "";
            return;
        }

        fetch("/api/members/search?query=" + query)
            .then(res => res.json())
            .then(data => {
                let box = document.getElementById("memberList");
                box.innerHTML = "";

                data.forEach(m => {
                    let a = document.createElement("a");
                    a.classList.add("list-group-item", "list-group-item-action");
                    a.innerHTML = `${m.member_no} - ${m.member_name}`;
                    a.onclick = () => selectMember(m.member_no);
                    box.appendChild(a);
                });
            });
    });

    function selectMember(member_no) {
        document.getElementById("member_no").value = member_no;
        document.getElementById("memberList").innerHTML = "";

        fetch("/api/loans/by-member/" + member_no)
            .then(res => res.json())
            .then(data => {
                let loanSelect = document.getElementById("loan_no");
                loanSelect.innerHTML = '<option value="">Select Loan</option>';

                data.forEach(l => {
                    loanSelect.innerHTML += `<option value="${l.loan_no}">
                        ${l.loan_no} — ${l.loan_type}
                    </option>`;
                });

                loanSelect.disabled = false;
            });
    }

    // LOAN DETAILS
    document.getElementById("loan_no").addEventListener("change", function () {
        let loan_no = this.value;
        if (!loan_no) return;

        fetch("/api/loan/details/" + loan_no)
            .then(res => res.json())
            .then(data => {
                document.getElementById("total_payable").value = data.total_payable;
                document.getElementById("principal_outstanding").value = data.principal_outstanding;
            });
    });

    // SUBMIT
    document.getElementById("submitBtn").addEventListener("click", function () {

        let payload = {
            member_no: document.getElementById("member_no").value,
            loan_no: document.getElementById("loan_no").value,
            part_amount: document.getElementById("part_amount").value
        };

        fetch("/loan/part-payment", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(msg => {
			alert(msg.message);
			window.location.reload();   // 🔄 auto refresh
		});

    });

</script>

{% endblock %}
