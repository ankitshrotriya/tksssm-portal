<!DOCTYPE html>
{% extends "base.html" %}
{% block content %}
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fixed Deposit (FD) Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #f0f4f8; font-family: 'Poppins', sans-serif; }
    .form-card { background: #fff; padding: 30px; border-radius: 12px; margin-top: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
    .form-title { text-align: center; font-weight: 600; font-size: 1.6rem; margin-bottom: 25px; color: #00368e; }
    label { font-weight: 500; }
    input:focus, select:focus { border-color: #00368e; box-shadow: none; }
    .btn-primary { background: #00368e; border: none; padding: 10px 20px; }
    .btn-primary:hover { background: #001e56; }
</style>
</head>
<div class="container">
    <div class="form-card">
        <h3 class="form-title">🏦 Fixed Deposit (FD) Opening Form</h3>

        <form id="fdForm" action="/fd/save" method="POST">
            <input type="hidden" id="fd_duration" name="fd_duration">
            <input type="hidden" id="deposit_amount" name="deposit_amount">
            <input type="hidden" id="start_date" name="start_date">
            <input type="hidden" id="maturity_amount" name="maturity_amount">
            <input type="hidden" id="voucher_no" name="voucher_no">

            <div class="row g-3">

                <div class="col-md-4">
                    <label>FD Account No *</label>
                    <input type="text" name="fd_account_no" class="form-control" value="{{ new_fd_no }}" readonly required>
                </div>

                <div class="col-md-4">
                    <label>Member No *</label>
                    <input list="memberList" name="member_no" id="member_no" class="form-control" 
                        placeholder="Type or select Member No" required onchange="fillMemberName()">
                    <datalist id="memberList"></datalist>
                </div>

                <div class="col-md-4">
                    <label>Member Name</label>
                    <input type="text" id="member_name" name="member_name" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label>Deposit Amount (₹) *</label>
                    <input type="number" id="deposit_amt" name="deposit_amt" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label>Duration Type *</label>
                    <select id="duration_type" name="duration_type" class="form-select" onchange="toggleDurationInput()">
                        <option value="">Select Type</option>
                        <option value="days">Days</option>
                        <option value="years">Years</option>
                    </select>
                </div>

                <div class="col-md-4" id="days_box" style="display:none;">
                    <label>Number of Days *</label>
                    <input type="number" id="fd_days" class="form-control" placeholder="e.g., 90">
                </div>

                <div class="col-md-4" id="years_box" style="display:none;">
                    <label>Number of Years *</label>
                    <select id="fd_years" class="form-select">
                        <option value="">Select Years</option>
                        <option value="1">1 Year</option>
                        <option value="2">2 Year</option>
                        <option value="3">3 Year</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Interest Rate (%)</label>
                    <input type="text" id="interest_rate" name="interest_rate" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label>Opening Date *</label>
                    <input type="date" id="opening_date" name="opening_date" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label>Maturity Date</label>
                    <input type="date" id="maturity_date" name="maturity_date" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <label>Maturity Amount (₹)</label>
                    <input type="text" id="maturity_amt" name="maturity_amt" class="form-control" readonly>
                </div>

                <div class="col-md-6">
                    <label>Nominee Name</label>
                    <input type="text" name="nominee_name" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Nominee Relationship</label>
                    <input type="text" name="nominee_relation" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Voucher No *</label>
                    <div style="display:flex;gap:5px;">
                        <select id="voucher_type" class="form-select" style="width: 40%;">
                            <option value="">Type</option>
                            <option value="MR/">MR/</option>
                            <option value="TR/">TR/</option>
                            <option value="NV/">NV/</option>
                        </select>
                        <input type="text" id="voucher_number" class="form-control" placeholder="Enter No." style="width:60%;">
                    </div>
                </div>

                <div class="col-md-12">
                    <label>Remark</label>
                    <input type="text" name="remark" class="form-control" value="Active">
                </div>

            </div><br>

            <label>
                <input type="checkbox" name="auto_renew" checked>
                Auto Renew FD
            </label><br>

            <label class="mt-2">
                <input type="checkbox" name="withdraw_interest" id="withdraw_interest">
                Withdraw yearly interest to Savings Account
            </label>

            <div class="text-center mt-4">
                <button type="button" class="btn btn-primary" onclick="submitFD()">Submit FD</button>
            </div>

        </form>
    </div>
</div>

<!-- JAVASCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    // Member Auto-fill
    fetch("/get_active_members")
        .then(res => res.json())
        .then(data => {
            window.allMembers = data;
            const list = document.getElementById("memberList");
            data.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m.member_no;
                opt.text = `${m.member_no} - ${m.member_name_eng}`;
                list.appendChild(opt);
            });
        });

    // Voucher hidden field update
    const voucherType = document.getElementById("voucher_type");
    const voucherNum = document.getElementById("voucher_number");
    const voucherFinal = document.getElementById("voucher_no");
    [voucherType, voucherNum].forEach(el => el.addEventListener("input", () => {
        voucherFinal.value = (voucherType.value || '') + (voucherNum.value.trim() || '');
    }));
});

function fillMemberName() {
    const memNo = document.getElementById("member_no").value;
    if (!window.allMembers) return;
    const mem = window.allMembers.find(x => String(x.member_no) === String(memNo));
    document.getElementById("member_name").value = mem ? mem.member_name_eng : "";
}

function toggleDurationInput() {
    let type = document.getElementById("duration_type").value;
    document.getElementById("days_box").style.display = type === "days" ? "block" : "none";
    document.getElementById("years_box").style.display = type === "years" ? "block" : "none";
    updateInterest();
}

function updateInterest() {
    let type = document.getElementById("duration_type").value;
    let rate = 0;
    if (type === "days") {
        let days = parseInt(document.getElementById("fd_days").value);
        if (days >= 45 && days <= 179) rate = 3;
        else if (days >= 180 && days <= 364) rate = 4;
    } else if (type === "years") {
        let years = parseInt(document.getElementById("fd_years").value);
        if (years === 1) rate = 7.25;
        else if (years === 2) rate = 7.50;
        else if (years === 3) rate = 8;
    }
    document.getElementById("interest_rate").value = rate || "";
    updateMaturity();
}

function updateMaturity() {
    let openingDate = document.getElementById("opening_date").value;
    let amount = parseFloat(document.getElementById("deposit_amt").value);
    let rate = parseFloat(document.getElementById("interest_rate").value);
    let type = document.getElementById("duration_type").value;
    if (!openingDate || !amount || !rate) return;

    let start = new Date(openingDate);
    let days = 0, years = 0;

    if (type === "days") {
        days = parseInt(document.getElementById("fd_days").value);
        start.setDate(start.getDate() + days);
    } else if (type === "years") {
        years = parseInt(document.getElementById("fd_years").value);
        start.setFullYear(start.getFullYear() + years);
    }

    document.getElementById("maturity_date").value = start.toISOString().split('T')[0];

    let interest = type === "days" ? amount * rate * days / 36500 : amount * rate * years / 100;
    let maturityAmt = Math.round(amount + interest);
    document.getElementById("maturity_amt").value = maturityAmt;

    // Hidden fields for backend
    document.getElementById("fd_duration").value = type === "days" ? days : years * 365;
    document.getElementById("deposit_amount").value = amount;
    document.getElementById("start_date").value = openingDate;
    document.getElementById("maturity_amount").value = maturityAmt;
}

// Event listeners for inputs
["fd_days","fd_years","deposit_amt","opening_date"].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener("input", () => { updateInterest(); updateMaturity(); });
});

// Submit FD
async function submitFD() {
    const form = document.getElementById('fdForm');
    const member_no = document.getElementById('member_no').value;
    const amount = document.getElementById('deposit_amt').value;

    if (!member_no || !amount) {
        alert("⚠️ Please select member and enter amount.");
        return;
    }

    const resp = await fetch(`/check_balance_amount/${member_no}/${amount}`);
    const data = await resp.json();

    if (!data.ok) {
        alert("❌ Insufficient balance! FD cannot be created.");
        return;
    }

    alert("✅ FD created successfully!");
    form.submit();
}
</script>
</body>
</html>
{% endblock %}
