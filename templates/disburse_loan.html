{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🏦 Loan Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{background:#f0f4f8;font-family:'Poppins',sans-serif}
.form-card{background:#fff;padding:30px;border-radius:12px;margin-top:30px;box-shadow:0 6px 15px rgba(0,0,0,0.1)}
.form-title{text-align:center;font-weight:600;font-size:1.6rem;margin-bottom:25px;color:#00368e}
label{font-weight:600;margin-bottom:6px}
.preview-box{padding:15px;background:#F1F7FF;border-left:4px solid #3E8EDE;border-radius:8px;height:100%}
.suggest-box{border:1px solid #ddd;background:#fff;position:absolute;width:100%;max-height:160px;overflow-y:auto;border-radius:6px;display:none;z-index:1000}
.suggest-box div{padding:8px;cursor:pointer}
.suggest-box div:hover{background:#e6f0ff}
</style>
</head>

<body>
<div class="container">
<div class="form-card">

<h3 class="form-title">🏦 Loan Application</h3>

<form method="POST" action="/loan/new" id="loanForm">
<div class="row g-3">

<!-- MEMBER -->
<div class="col-md-6 position-relative">
<label>Member Number</label>
<input type="text" id="member_no" name="member_no" class="form-control" autocomplete="off">
<div id="suggestions" class="suggest-box"></div>
</div>

<div class="col-md-6">
<label>Member Name</label>
<input type="text" id="member_name" name="member_name" class="form-control" readonly>
</div>

<!-- LOAN -->
<div class="col-md-6">
<label>Loan Type</label>
<select name="loan_head" id="loan_head" class="form-select" required>
{% for h in heads %}
<option value="{{ h }}">{{ h }}</option>
{% endfor %}
</select>
</div>

<div class="col-md-6">
<label>Loan Amount</label>
<input type="number" step="0.01" id="principal" name="principal" class="form-control" required>
</div>

<div class="col-md-6">
<label>Interest Rate (%)</label>
<input type="number" step="0.01" id="interest_rate" name="interest_rate" class="form-control" required>
</div>

<div class="col-md-6">
<label>EMI Amount</label>
<input type="number" step="0.01" id="emi_amount" name="emi_amount" class="form-control" required>
</div>

<!-- TENURE + BREAKUP -->
<div class="col-md-6">
<label>Tenure (Months)</label>
<input type="number" id="tenure_months" name="tenure_months" class="form-control" readonly>
</div>

<div class="col-md-6">
<label>Loan Breakup</label>
<div class="preview-box">
  <div><strong>Principal :</strong> ₹ <span id="p_amt">0</span></div>
  <div><strong>Interest :</strong> ₹ <span id="i_amt">0</span></div>
  <div><strong>Total Payable :</strong> ₹ <span id="t_amt">0</span></div>
</div>
</div>

</div>

<hr class="my-4">

<h5 class="text-primary">👥 Guarantor Details</h5>

{% for i in range(1,5) %}
<div class="row g-3">
<div class="col-md-6 position-relative">
<label>Guarantor {{ i }} Member No</label>
<input type="text" id="guarantor{{ i }}_member_no"
       name="guarantor{{ i }}_member_no"
       class="form-control"
       oninput="searchGuarantor(this, {{ i }})">
<div id="guarantor_suggestions_{{ i }}" class="suggest-box"></div>
</div>

<div class="col-md-6">
<label>Guarantor {{ i }} Name</label>
<input type="text" id="guarantor{{ i }}_name"
       name="guarantor{{ i }}_name"
       class="form-control" readonly>
</div>
</div>
{% endfor %}

<button class="btn btn-primary w-100 mt-4">💾 Submit Loan Application</button>
</form>

<div class="preview-box mt-3" id="allowedBox" style="display:none">
<strong>अनुमत राशि:</strong> ₹ <span id="allowed_text">—</span>
</div>

</div>
</div>

<script>
let allowedAmount = 0;
const allowedBox = document.getElementById("allowedBox");

/* MEMBER SEARCH */
member_no.addEventListener("input", function(){
    const q=this.value.trim();
    if(q.length<1){suggestions.style.display="none";return;}
    fetch("/api/search_members?q="+q).then(r=>r.json()).then(d=>{
        suggestions.innerHTML="";
        if(!d.length){suggestions.style.display="none";return;}
        d.forEach(r=>{
            let div=document.createElement("div");
            div.textContent=`${r.member_no} - ${r.name}`;
            div.onclick=()=>{member_no.value=r.member_no;suggestions.style.display="none";loadEligibility();}
            suggestions.appendChild(div);
        });
        suggestions.style.display="block";
    });
});

/* ELIGIBILITY */
loan_head.addEventListener("change",()=>{allowedAmount=0;loadEligibility();});
principal.addEventListener("input",updateAllowedBox);

function loadEligibility(){
    if(!member_no.value)return;

    if(loan_head.value==="पावती तरन क़र्ज़"){
        fetch("/api/get_member_fd/"+member_no.value).then(r=>r.json()).then(d=>{
            member_name.value=d.name;
            allowedAmount=d.allowed||0;
            updateAllowedBox();
        });
        return;
    }

    if(loan_head.value==="जमानती क़र्ज़"){
        fetch("/api/get_member/"+member_no.value).then(r=>r.json()).then(d=>{
            member_name.value=d.name;
            allowedAmount=(d.anivarya_balance||0)*2.5;
            updateAllowedBox();
        });
    }
}

function updateAllowedBox(){
    const amt=parseFloat(principal.value||0);
    if(!["जमानती क़र्ज़","पावती तरन क़र्ज़"].includes(loan_head.value)){
        allowedBox.style.display="none";return;
    }
    allowedBox.style.display="block";
    allowed_text.textContent=allowedAmount.toFixed(2);
    allowedBox.style.borderLeftColor=amt>allowedAmount?"red":"#3E8EDE";
}

/* TENURE + INTEREST */
function calculateTenure(){
    const P=parseFloat(principal.value||0);
    const EMI=parseFloat(emi_amount.value||0);
    if(P>0 && EMI>0) tenure_months.value=Math.ceil(P/EMI);
    else tenure_months.value="";
    calculateBreakup();
}

function calculateBreakup(){
    const P=parseFloat(principal.value||0);
    const R=parseFloat(interest_rate.value||0);
    const T=parseInt(tenure_months.value||0);
    if(P>0 && R>0 && T>0){
        const interest=P*(R/100)*(T/12);
        const total=P+interest;
        p_amt.textContent=P.toFixed(2);
        i_amt.textContent=interest.toFixed(2);
        t_amt.textContent=total.toFixed(2);
    }else{
        p_amt.textContent=i_amt.textContent=t_amt.textContent="0";
    }
}

principal.addEventListener("input",calculateTenure);
emi_amount.addEventListener("input",calculateTenure);
interest_rate.addEventListener("input",calculateBreakup);

/* SUBMIT */
loanForm.addEventListener("submit",function(e){
    e.preventDefault();
    if(principal.value>allowedAmount && ["जमानती क़र्ज़","पावती तरन क़र्ज़"].includes(loan_head.value)){
        Swal.fire("⚠ Warning","Allowed limit: ₹"+allowedAmount.toFixed(2),"error");
        return;
    }
    Swal.fire({
        title:"✔ Confirm",
        text:"क्या Loan सबमिट करें?",
        icon:"question",
        showCancelButton:true
    }).then(r=>{if(r.isConfirmed) loanForm.submit();});
});

/* GUARANTOR */
function searchGuarantor(inp,i){
    const q=inp.value.trim();
    const box=document.getElementById("guarantor_suggestions_"+i);
    if(q.length<1){box.style.display="none";return;}
    fetch("/api/search_members?q="+q).then(r=>r.json()).then(d=>{
        box.innerHTML="";
        if(!d.length){box.style.display="none";return;}
        d.forEach(r=>{
            let div=document.createElement("div");
            div.textContent=`${r.member_no} - ${r.name}`;
            div.onclick=()=>selectGuarantor(r,i);
            box.appendChild(div);
        });
        box.style.display="block";
    });
}

function selectGuarantor(r,i){
    if(r.member_no==member_no.value){alert("Borrower khud guarantor nahi ho sakta");return;}
    for(let x=1;x<=4;x++){
        if(x!==i && document.getElementById("guarantor"+x+"_member_no").value==r.member_no){
            alert("Same guarantor 2 baar select nahi kar sakte");return;
        }
    }
    document.getElementById("guarantor"+i+"_member_no").value=r.member_no;
    document.getElementById("guarantor"+i+"_name").value=r.name;
    document.getElementById("guarantor_suggestions_"+i).style.display="none";
}
</script>

</body>
</html>
{% endblock %}
