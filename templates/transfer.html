{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔁 Multi Account Transfer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: #f0f4f8;
        font-family: 'Poppins', sans-serif;
    }

    .form-card {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        margin-top: 30px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .form-title {
        text-align: center;
        font-weight: 600;
        font-size: 1.6rem;
        margin-bottom: 25px;
        color: #00368e;
    }

    .section-label {
        font-size: 1.2rem;
        font-weight: 600;
        margin-top: 10px;
        color: #0b4da2;
        border-left: 5px solid #0b4da2;
        padding-left: 8px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="form-card">

        <h3 class="form-title">🔁 Multi Account Transfer</h3>

        <form method="POST" action="/transfer" id="transferForm">

            <div class="row g-3">

                <!-- ===================== FROM SECTION ===================== -->
                <div class="col-12 section-label">From (Sender)</div>

                <div class="col-md-6">
    <label>From Member *</label>
    <input list="memberListFrom" id="from_member" name="from_member" class="form-control" required placeholder="Type or select Member">
    <datalist id="memberListFrom"></datalist>
</div>


                <div class="col-md-3">
                    <label>From Account Type *</label>
                    <select name="from_acc_type" id="from_acc_type" class="form-select" required>

                        <option value="Saving Account">Saving Account</option>
                        <option value="Anivarya Sanchay">Anivarya Sanchay</option>
                        <option value="Share Account">Share Account</option>
                        <option value="RD">Recurring Deposit (RD)</option>
                        <option value="FD">Fixed Deposit (FD)</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label>From Account No *</label>
                    <select id="from_acc_no" name="from_acc_no" class="form-select" required>
                        <option value="">Select Account</option>
                    </select>
                </div>

                <!-- ===================== TO SECTION ===================== -->
                <div class="col-12 section-label" style="border-color:#00a35a;color:#00884b;">To (Receiver)</div>

               <div class="col-md-6">
    <label>To Member *</label>
    <input list="memberListTo" id="to_member" name="to_member" class="form-control" required placeholder="Type or select Member">
    <datalist id="memberListTo"></datalist>
</div>



               <div class="col-md-3">
    <label>To Account Type *</label>
    <select id="to_acc_type" name="to_acc_type" class="form-select" required>
        <option value="Saving Account">Saving Account</option>
        <option value="Anivarya Sanchay">Anivarya Sanchay</option>
        <option value="Share Account">Share Account</option>
        <option value="RD">Recurring Deposit (RD)</option>
        <option value="FD">Fixed Deposit (FD)</option>
    </select>
</div>


                <div class="col-md-3">
                    <label>To Account No *</label>
                    <select id="to_acc_no" name="to_acc_no" class="form-select" required>
                        <option value="">Select Account</option>
                    </select>
                </div>

                <!-- ===================== AMOUNT SECTION ===================== -->
                <div class="col-md-4">
                    <label>Amount *</label>
                    <input type="number" name="amount" class="form-control" min="1" step="0.01" required>
                </div>

                <div class="col-md-4">
                    <label>Source *</label>
                    <select name="source" class="form-select" required>
                        <option value="Cash">Cash</option>
                        <option value="Bank">Bank</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Date</label>
                    <input type="date" name="trans_date" value="{{ now.date() }}" class="form-control">
                </div>

                <div class="col-md-12">
                    <label>Remark</label>
                    <textarea name="remark" class="form-control" rows="2" placeholder="Optional"></textarea>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary px-4">🔁 Submit Transfer</button>
            </div>
        </form>
    </div>
</div>

<script>
function loadAccounts(member, type, target) {
    if (!member) return;

    target.innerHTML = '<option>Loading...</option>';

    fetch(`/get_accounts_by_type/${member}/${encodeURIComponent(type)}`)
    .then(r => r.json())
    .then(data => {
        target.innerHTML = '<option value="">Select Account</option>';
        data.accounts.forEach(a => {
            let opt = document.createElement("option");
            opt.value = a;
            opt.textContent = a;
            target.appendChild(opt);
        });
    });
}

from_member.onchange = () => loadAccounts(from_member.value, from_acc_type.value, from_acc_no);
from_acc_type.onchange = () => loadAccounts(from_member.value, from_acc_type.value, from_acc_no);

to_member.onchange = () => loadAccounts(to_member.value, to_acc_type.value, to_acc_no);
to_acc_type.onchange = () => loadAccounts(to_member.value, to_acc_type.value, to_acc_no);


</script>


<script>

    // Your existing JS functions...

    const transferForm = document.getElementById("transferForm");

    transferForm.addEventListener("submit", e => {
        if (from_acc_no.value === to_acc_no.value) {
            e.preventDefault();
            alert("Source और Target account same नहीं हो सकते!");
        }
    });

</script>


<script>
window.onload = function () {

    const transferForm = document.getElementById("transferForm");
    const fromMember = document.getElementById("from_member");
    const fromType = document.getElementById("from_acc_type");
    const fromAcc = document.getElementById("from_acc_no");

    const toMember = document.getElementById("to_member");
    const toType = document.getElementById("to_acc_type");
    const toAcc = document.getElementById("to_acc_no");

    function loadAccounts(member, type, target) {
        if (!member || !type) return;

        target.innerHTML = '<option>Loading...</option>';

        fetch(`/get_accounts_by_type/${member}/${encodeURIComponent(type)}`)
            .then(r => r.json())
            .then(data => {
                target.innerHTML = '<option value="">Select Account</option>';
                data.accounts.forEach(a => {
                    let opt = document.createElement("option");
                    opt.value = a;
                    opt.textContent = a;
                    target.appendChild(opt);
                });
            });
    }

    // Load accounts events
    fromMember.onchange = () => loadAccounts(fromMember.value, fromType.value, fromAcc);
    fromType.onchange = () => loadAccounts(fromMember.value, fromType.value, fromAcc);

    toMember.onchange = () => loadAccounts(toMember.value, toType.value, toAcc);
    toType.onchange = () => loadAccounts(toMember.value, toType.value, toAcc);

    // 🚫 Prevent submit if both accounts match
    transferForm.addEventListener("submit", function (e) {

        if (fromAcc.value && toAcc.value && fromAcc.value === toAcc.value) {
            e.preventDefault();
            alert("❌ Source और Target account same नहीं हो सकते!");
            return;
        }
    });

};
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}

            Swal.fire({
                icon: "{{ 'success' if category=='success' else 'error' }}",
                title: "{{ message }}",
                confirmButtonColor: '#3085d6',
            });

        {% endfor %}
    {% endif %}
{% endwith %}
</script>

<script>
// Load member list for both FROM and TO inputs
document.addEventListener("DOMContentLoaded", () => {
    fetch("/get_active_members")
        .then(res => res.json())
        .then(data => {
            const listFrom = document.getElementById("memberListFrom");
            const listTo = document.getElementById("memberListTo");

            data.forEach(m => {
                let opt1 = document.createElement("option");
                opt1.value = m.member_no;
                opt1.text = `${m.member_no} - ${m.member_name_eng}`;
                listFrom.appendChild(opt1);

                let opt2 = document.createElement("option");
                opt2.value = m.member_no;
                opt2.text = `${m.member_no} - ${m.member_name_eng}`;
                listTo.appendChild(opt2);
            });
        });
});
</script>



</body>
</html>
{% endblock %}
