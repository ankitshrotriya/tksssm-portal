<!DOCTYPE html>
<html>
<head>
<title>Donation</title>

<style>

body{
font-family:Arial, sans-serif;
background:#fff5eb;
margin:0;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

.header{
flex-direction:column;
align-items:center;
text-align:center;
padding:15px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-top:10px;
}

nav a{
margin:4px 6px;
font-size:14px;
}

.container{
margin:15px;
padding:20px;
}

h1{
font-size:22px;
}

.section{
font-size:17px;
}

.form-grid{
grid-template-columns:1fr;
gap:14px;
}

.form-group.full{
grid-column:1;
}

input{
font-size:16px;
padding:12px;
}

button{
font-size:17px;
padding:15px;
}

.qr-box img{
width:200px;
}

.logo-area img{
height:55px;
}

}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:#ff7a00;
color:white;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-area img{
height:65px;
width:auto;
background:white;
padding:4px;
border-radius:50%;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:bold;
}

/* container */

.container{
max-width:700px;
margin:30px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* headings */

h1{
text-align:center;
color:#ff7a00;
margin-bottom:5px;
}

.section{
margin-top:30px;
font-size:18px;
font-weight:bold;
color:#333;
border-bottom:2px solid #ff7a00;
padding-bottom:6px;
}

/* form */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group.full{
grid-column:1/3;
}

label{
font-size:14px;
margin-bottom:4px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

/* QR */

.qr-box{
text-align:center;
margin-top:20px;
}

.qr-box img{
width:230px;
}

/* button */

button{
background:#ff7a00;
color:white;
padding:14px;
border:none;
width:100%;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#e66900;
}

</style>
</head>

<body>

<header class="header">

<div class="logo-area">

<img src="images/logo.png">

<div>
<strong>म.प्र.वि.मं. तकनीकी कर्मचारी संघ</strong><br>
<span style="font-size:12px;">श्रमेव जयते</span>
</div>

</div>

<nav>

<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
<a href="registration.html">Registration</a>
<a href="donation.html" class="donation-btn">Donation</a>

</nav>

</header>

<div class="container">

<h1>Donation Form</h1>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="ce2e7089-54a4-45dc-90e9-915f2dbf3c85">

<input type="hidden" name="subject" value="New Donation Received">

<div class="section">Donation Details</div>

<div class="form-grid">

<div class="form-group">
<label>पूरा नाम</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>मोबाइल नंबर</label>
<input type="text" name="mobile" required>
</div>

<div class="form-group full">
<label>Union ID (अगर हो)</label>
<input type="text" name="union_id">
</div>

</div>

<div class="section">Payment</div>

<div class="qr-box">

<img src="images/payment-qr.jpg">

<p>UPI ID: 9977885049@ibl</p>

<p>QR स्कैन करके दान राशि भेजें</p>

</div>

<div class="section">Payment Verification</div>

<div class="form-group">
<label>UTR नंबर</label>
<input type="text" name="utr_number" required>
</div>

<button type="submit">Donation Submit</button>

</form>

</div>

</body>
</html>
