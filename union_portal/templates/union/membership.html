{% extends "union/base.html" %}
{% block content %}

<style>
.form-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.section-title {
    font-size: 18px;
    font-weight: bold;
    color: #1e3a8a;
    margin: 20px 0 10px;
}
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}
.input-group {
    display: flex;
    flex-direction: column;
}
.input-group label {
    font-size: 13px;
    margin-bottom: 5px;
    color: #1e3a8a;
    font-weight: 600;
}
.input-group input,
.input-group select {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
}
.full-width {
    grid-column: span 2;
}
.payment-box {
    background: #eef2ff;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    margin-top: 20px;
}
.amount-display {
    font-size: 32px;
    font-weight: bold;
    color: #16a34a;
    margin: 10px 0;
}
#qrcode {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
}
#qrcode canvas,
#qrcode img {
    display: block;
    margin: 0 auto;
}
.submit-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
}
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.modal-content {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 400px;
    animation: pop 0.3s ease;
}
.modal-content button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
@media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .full-width { grid-column: span 1; }
}
</style>

{% if success == "1" %}
<div id="successModal" class="modal">
    <div class="modal-content">
        <h2 style="color:green;">🎉 पंजीकरण सफल</h2>
        <p>आपका सदस्यता फॉर्म सफलतापूर्वक जमा हो गया है।</p>
        <button onclick="closeModal()">ठीक है</button>
    </div>
</div>
{% endif %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function updateAmount() {
    var fee = document.getElementById("membership_fee").value;
    var display = document.getElementById("amountDisplay");
    display.innerHTML = fee ? "₹" + fee : "₹0";

    if (fee) {
        var upiID = "9977885049@ibl";
        var name = "Union Membership";
        var upiLink = `upi://pay?pa=${upiID}&pn=${name}&am=${fee}&cu=INR`;

        document.getElementById("qrcode").innerHTML = "";

        new QRCode(document.getElementById("qrcode"), {
            text: upiLink,
            width: 200,
            height: 200
        });
    }
}

document.getElementById("membershipForm").addEventListener("submit", function() {
    document.getElementById("submitBtn").disabled = true;
});

function closeModal() {
    document.getElementById("successModal").style.display = "none";
    window.history.replaceState({}, document.title, "/membership");
    document.getElementById("membershipForm").reset();
    document.getElementById("amountDisplay").innerHTML = "₹0";
    document.getElementById("qrcode").innerHTML = "";
}
</script>
