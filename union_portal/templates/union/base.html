<!DOCTYPE html>
<html>
<head>
    <title>म.प्र.वि.मं. तकनीकी कर्मचारी संघ</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
        }

        .app-container {
            max-width: 500px;
            margin: auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 15px;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-top img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            padding: 4px;
        }

        .union-title {
            font-size: 16px;
            font-weight: bold;
        }

        .union-subtitle {
            font-size: 14px;
            font-style: italic;
        }

        .union-address {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #2563eb;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        .card {
            background: #f9fafb;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="header">
        <div class="header-top">
            <img src="{{ url_for('union.static', filename='union_logo.png') }}">


            <div>
                <div class="union-title">
                    म.प्र.वि.मं. तकनीकी कर्मचारी संघ
                </div>

                <div class="union-subtitle">
                    M.P.E.B Takneeki Karmachari Sangh
                </div>

                <div class="union-address">
                    मुख्य कार्यालय: एम-11, विद्युत नगर, रामपुर, जबलपुर – 482008 (म.प्र.)
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
